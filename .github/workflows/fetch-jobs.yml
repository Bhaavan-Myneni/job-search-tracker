name: Fetch Jobs

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 9 AM ET, daily
  workflow_dispatch: {}      # allows the "Fetch New Jobs" button to trigger manually

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch jobs
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: node fetch-jobs.js

      - name: Commit updated jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json
          git commit -m "chore: daily job refresh $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
